# Configuración de despliegue para StellarVertex
# Con este archivo, Netlify se configura solo al importar el repo —
# no hace falta tocar nada manualmente en la pantalla de "Build settings".

[build]
  publish   = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/.netlify/functions/*"
  to   = "/.netlify/functions/:splat"
  status = 200
